# Enviro Brain 主配置文件
spring:
  profiles:
    active: dev

# 通用配置
server:
  port: 8080

# API Key（默认值，各 profile 可覆盖）
enviro:
  api:
    key: dev-api-key-2026
  hikvision:
    host: ${HIKVISION_HOST:}
    port: 443
    app-key: ${HIKVISION_APP_KEY:}
    app-secret: ${HIKVISION_APP_SECRET:}
    api-path: /artemis
    timeout: 15
    retry-count: 3
    warmup-seconds: 5.0
  python:
    path: python3
    script-path: scripts/camera_capture.py
  screenshots:
    dir: ./screenshots
  ledger:
    dir: ./ledger
    template-path: templates/危废仓库巡查台账_新模版.docx
  feishu:
    webhook-url: ${FEISHU_WEBHOOK_URL:}
  queqiao:
    callback-url: ${QUEQIAO_CALLBACK_URL:http://localhost:8081/api/notify/new-data}
    notify-api-key: ${QUEQIAO_NOTIFY_API_KEY:queqiao-notify-key-2026}
  inspection:
    concurrency: 12
    capture-timeout-seconds: 120
    cron: ${ENVIRO_INSPECTION_CRON:0 0 9,15 * * ?}

  # MinIO 对象存储（截图上传）
  minio:
    endpoint: ${MINIO_ENDPOINT:http://172.168.97.180:30113}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin@123}
    bucket: ${MINIO_BUCKET:scenes-camerapatrol}
    prefix: ${MINIO_PREFIX:}
    retention-days: 7
    cleanup:
      enabled: true
      cron: "${ENVIRO_MINIO_CLEANUP_CRON:0 0 2 * * ?}"

  # 场景配置：按 scenario 维度区分（enviro=危废仓库，gangqu=智慧港区）
  scenarios:
    enviro:
      feishu-webhook-url: ${FEISHU_WEBHOOK_URL:}
      card-title: "危废仓库摄像头巡检报告"
      card-footer: "环保小脑自动巡检"
      minio-prefix: ""
    gangqu:
      feishu-webhook-url: ${GANGQU_FEISHU_WEBHOOK_URL:}
      card-title: "智慧港区小脑巡检报告"
      card-footer: "智慧港区小脑"
      minio-prefix: "gangqu"

# MyBatis 配置
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.enviro.brain.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
