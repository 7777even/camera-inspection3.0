# enviro-brain/src/main/resources/application-prod.yml
enviro:
  hikvision:
    host: ${HIKVISION_HOST}
    app-key: ${HIKVISION_APP_KEY}
    app-secret: ${HIKVISION_APP_SECRET}
  feishu:
    webhook-url: ${FEISHU_WEBHOOK_URL}
  inspection:
    concurrency: 12
    capture-timeout-seconds: 120
  template-path: templates/危废仓库巡查台账_新模版.docx
  screenshots:
    dir: /data/screenshots
  ledger:
    dir: /data/ledger
    template-path: templates/危废仓库巡查台账_新模版.docx
  minio:
    retention-days: ${ENVIRO_MINIO_RETENTION_DAYS:7}
    cleanup:
      enabled: ${ENVIRO_MINIO_CLEANUP_ENABLED:true}
      cron: ${ENVIRO_MINIO_CLEANUP_CRON:0 0 2 * * ?}

spring:
  datasource:
    url: ${PG_URL:jdbc:postgresql://172.168.97.180:31028/smartpark_scenes_zhh?stringtype=unspecified}
    username: ${PG_USERNAME:postgres}
    password: ${PG_PASSWORD:postgresql}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20

server:
  port: 8080

logging:
  level:
    com.enviro: INFO
    org.springframework: WARN
